<section class="profile-page">
  <div class="page-head page-head--compact">
    <div>
      <h1>{{ 'profileEditTitle' | translate }}</h1>
      <p>{{ 'profileEditSubtitle' | translate }}</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="profile-card">
    <div class="profile-card__header">
      <div>
        <h2>{{ 'profileEditPersonalTitle' | translate }}</h2>
        <p>{{ 'profileEditPersonalSubtitle' | translate }}</p>
      </div>
    </div>

    <div class="profile-form-grid">
      <label class="profile-field">
        <span>{{ 'profilePhone' | translate }}</span>
        <input class="profile-input" type="tel" formControlName="phone" />
      </label>

      <label class="profile-field">
        <span>{{ 'profileCustomerCity' | translate }}</span>
        <input class="profile-input" type="text" formControlName="customerCity" />
      </label>

      <label class="profile-field">
        <span>{{ 'profileCustomerCountry' | translate }}</span>
        <input class="profile-input" type="text" formControlName="customerCountry" />
      </label>
    </div>

    <div class="profile-card__divider"></div>

    <div class="profile-card__header">
      <div>
        <h2>{{ 'profileEditSellerTitle' | translate }}</h2>
        <p>{{ 'profileEditSellerSubtitle' | translate }}</p>
      </div>
    </div>

    <div class="profile-form-grid">
      <label class="profile-field">
        <span>{{ 'profileSellerDisplayName' | translate }}</span>
        <input class="profile-input" type="text" formControlName="display_name" />
      </label>

      <label class="profile-field profile-form-grid__full">
        <span>{{ 'profileBio' | translate }}</span>
        <textarea
          class="profile-input profile-input--textarea"
          rows="4"
          formControlName="bio"
        ></textarea>
      </label>

      <label class="profile-field">
        <span>{{ 'profileSellerCity' | translate }}</span>
        <input class="profile-input" type="text" formControlName="sellerCity" />
      </label>

      <label class="profile-field">
        <span>{{ 'profileSellerCountry' | translate }}</span>
        <input class="profile-input" type="text" formControlName="sellerCountry" />
      </label>
    </div>

    <div class="profile-card__actions">
      <button
        class="app-button app-button--primary profile-card__submit"
        type="submit"
        [disabled]="isSubmitting()"
      >
        {{ (isSubmitting() ? 'profileSaving' : 'profileSave') | translate }}
      </button>
    </div>
  </form>
</section>
