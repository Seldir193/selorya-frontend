<section class="auth-page">
  <article class="auth-card">
    <div class="auth-card__head">
      <p class="auth-card__eyebrow">{{ 'registerEyebrow' | translate }}</p>
      <h1>{{ 'registerTitle' | translate }}</h1>
      <p>{{ 'registerSubtitle' | translate }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <label class="auth-field">
        <span class="auth-field__label">{{ 'fullNameLabel' | translate }}</span>
        <input class="auth-field__control" type="text" formControlName="full_name" />
      </label>

      <label class="auth-field">
        <span class="auth-field__label">{{ 'emailLabel' | translate }}</span>
        <input class="auth-field__control" type="email" formControlName="email" />
      </label>

      <label class="auth-field">
        <span class="auth-field__label">{{ 'passwordLabel' | translate }}</span>
        <input class="auth-field__control" type="password" formControlName="password" />
      </label>

      @if (errorText()) {
        <p class="auth-error">{{ errorText() }}</p>
      }

      <button
        class="app-button app-button--checkout auth-submit"
        type="submit"
        [disabled]="isSubmitting()"
      >
        {{ (isSubmitting() ? 'registerSubmitting' : 'registerSubmit') | translate }}
      </button>

      <p class="auth-switch">
        {{ 'registerLoginPrompt' | translate }}
        <a routerLink="/login" class="auth-link">{{ 'registerLoginLink' | translate }}</a>
      </p>
    </form>
  </article>
</section>
