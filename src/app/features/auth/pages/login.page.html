<section class="auth-page">
  <article class="auth-card auth-card--compact">
    <div class="auth-card__head">
      <p class="auth-card__eyebrow">{{ 'loginEyebrow' | translate }}</p>
      <h1>{{ 'loginTitle' | translate }}</h1>
    </div>

    <div class="auth-social">
      <button
        class="app-button app-button--social"
        type="button"
        (click)="showExternalLoginUnavailable('Google')"
      >
        <img
          class="app-button__icon"
          src="assets/icons/auth/google.svg"
          alt=""
          aria-hidden="true"
        />
        {{ 'continueWithGoogle' | translate }}
      </button>

      <button
        class="app-button app-button--social"
        type="button"
        (click)="showExternalLoginUnavailable('Apple')"
      >
        <img class="app-button__icon" src="assets/icons/auth/apple.svg" alt="" aria-hidden="true" />
        {{ 'continueWithApple' | translate }}
      </button>

      <button
        class="app-button app-button--social"
        type="button"
        (click)="showExternalLoginUnavailable('Facebook')"
      >
        <img
          class="app-button__icon"
          src="assets/icons/auth/facebook.svg"
          alt=""
          aria-hidden="true"
        />
        {{ 'continueWithFacebook' | translate }}
      </button>
    </div>

    <div class="auth-divider">{{ 'authDividerOr' | translate }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <label class="auth-field">
        <span class="auth-field__box">
          <span class="auth-field__icon">
            <img src="assets/icons/auth/mail.svg" alt="" aria-hidden="true" />
          </span>
          <input
            class="auth-field__control"
            type="email"
            formControlName="email"
            [placeholder]="'emailPlaceholder' | translate"
            [attr.aria-label]="'emailPlaceholder' | translate"
          />
        </span>

        @if (form.controls.email.touched && form.controls.email.hasError('required')) {
          <span class="auth-error">{{ 'emailRequired' | translate }}</span>
        }

        @if (form.controls.email.touched && form.controls.email.hasError('email')) {
          <span class="auth-error">{{ 'emailInvalid' | translate }}</span>
        }
      </label>

      <label class="auth-field">
        <span class="auth-field__box">
          <span class="auth-field__icon">
            <img src="assets/icons/auth/lock.svg" alt="" aria-hidden="true" />
          </span>
          <input
            class="auth-field__control"
            [type]="isPasswordVisible() ? 'text' : 'password'"
            formControlName="password"
            [placeholder]="'passwordPlaceholder' | translate"
            [attr.aria-label]="'passwordPlaceholder' | translate"
          />
          <button
            class="auth-field__toggle"
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="'togglePasswordVisibility' | translate"
          >
            <img
              [src]="
                isPasswordVisible() ? 'assets/icons/auth/eye.svg' : 'assets/icons/auth/eye-off.svg'
              "
              alt=""
              aria-hidden="true"
            />
          </button>
        </span>

        @if (form.controls.password.touched && form.controls.password.hasError('required')) {
          <span class="auth-error">{{ 'passwordRequired' | translate }}</span>
        }
        @if (form.controls.password.touched && form.controls.password.hasError('minlength')) {
          <span class="auth-error">{{ 'passwordMinLength' | translate }}</span>
        }
      </label>

      <a routerLink="/forgot-password" class="auth-link auth-forgot">
        {{ 'forgotPasswordLink' | translate }}
      </a>

      @if (errorText()) {
        <p class="auth-error">{{ errorText() }}</p>
      }

      <button
        class="app-button app-button--primary app-button--full auth-submit"
        type="submit"
        [disabled]="form.invalid || isSubmitting()"
      >
        {{ (isSubmitting() ? 'loginSubmitting' : 'loginSubmit') | translate }}
      </button>

      <p class="auth-switch">
        {{ 'loginRegisterPrompt' | translate }}
        <a routerLink="/register" class="auth-link">{{ 'loginRegisterLink' | translate }}</a>
      </p>
    </form>
  </article>
</section>
