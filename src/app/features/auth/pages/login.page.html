<section class="auth-page">
  <article class="auth-card auth-card--compact">
    <div class="auth-card__head">
      <p class="auth-card__eyebrow">{{ 'loginEyebrow' | translate }}</p>
      <h1>{{ 'loginTitle' | translate }}</h1>
      <p>{{ 'loginSubtitle' | translate }}</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <label class="auth-field">
        <span class="auth-field__label">{{ 'emailLabel' | translate }}</span>
        <input class="auth-field__control" type="email" formControlName="email" />
      </label>

      <label class="auth-field">
        <span class="auth-field__label">{{ 'passwordLabel' | translate }}</span>
        <input class="auth-field__control" type="password" formControlName="password" />
      </label>

      @if (errorText()) {
        <p class="auth-error">{{ errorText() }}</p>
      }

      <button
        class="app-button app-button--checkout auth-submit"
        type="submit"
        [disabled]="isSubmitting()"
      >
        {{ (isSubmitting() ? 'loginSubmitting' : 'loginSubmit') | translate }}
      </button>

      <p class="auth-switch">
        {{ 'loginRegisterPrompt' | translate }}
        <a routerLink="/register" class="auth-link">{{ 'loginRegisterLink' | translate }}</a>
      </p>
    </form>
  </article>
</section>
