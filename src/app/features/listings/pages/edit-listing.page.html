<section class="create-listing-page edit-listing-page">
  <div class="page-head">
    <div>
      <span class="page-head__eyebrow">{{ text('listingSellEyebrow') }}</span>
      <h1>{{ text('editListingTitle') }}</h1>
    </div>

    <p>{{ text('editListingDescription') }}</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="listing-form">
    <div class="listing-form__grid">
      <app-form-select
        [label]="text('listingCategory')"
        [required]="true"
        [options]="categoryOptions()"
        formControlName="category"
      />

      <label class="form-field">
        <span>{{ text('listingTitle') }}*</span>
        <input formControlName="title" />
      </label>

      <label class="form-field">
        <span>{{ text('listingSlug') }}*</span>
        <input formControlName="slug" />
      </label>

      <label class="form-field">
        <span>{{ text('listingPrice') }}*</span>
        <input formControlName="price" />
      </label>

      <app-form-select
        [label]="text('listingCondition')"
        [required]="true"
        [options]="conditionOptions()"
        formControlName="condition"
      />

      <app-form-select
        [label]="text('listingStatus')"
        [required]="true"
        [options]="statusOptions()"
        formControlName="status"
      />

      <label class="form-field">
        <span>{{ text('listingCity') }}*</span>
        <input formControlName="city" />
      </label>

      <label class="form-field">
        <span>{{ text('listingCountry') }}*</span>
        <input formControlName="country" />
      </label>
    </div>

    <label class="form-field form-field--textarea">
      <span>{{ text('listingDescription') }}*</span>
      <textarea rows="5" formControlName="description"></textarea>
    </label>

    @if (listing()?.images?.length) {
      <div class="edit-gallery">
        @for (image of listing()!.images; track image.id) {
          <article class="edit-gallery__item">
            <img
              width="180"
              height="140"
              [src]="image.image_url"
              [alt]="image.alt_text || listing()!.title"
            />

            <div class="edit-gallery__actions">
              <button
                class="app-button app-button--secondary"
                type="button"
                (click)="makePrimary(image.id, image.alt_text, image.sort_order)"
              >
                {{ text('editListingMakePrimary') }}
              </button>

              <button
                class="edit-gallery__delete-icon"
                type="button"
                [attr.aria-label]="text('editListingDeleteImage')"
                [title]="text('editListingDeleteImage')"
                (click)="deleteImage(image.id)"
              >
                <img src="assets/icons/buy-sell/delete.svg" alt="" />
              </button>
            </div>
          </article>
        }
      </div>
    }

    <label class="upload-field">
      <input type="file" multiple accept="image/*" (change)="onFilesSelected($event)" />

      <span class="upload-field__icon" aria-hidden="true">
        <img src="assets/icons/buy-sell/upload-image.svg" alt="" />
      </span>

      <span class="upload-field__content">
        <strong>{{ text('listingAddMoreImages') }}</strong>
        <small>{{ text('listingImagesHint') }}</small>
      </span>
    </label>

    @if (selectedFiles().length) {
      <button
        class="app-button app-button--secondary listing-form__upload"
        type="button"
        (click)="uploadImages()"
      >
        {{ text('listingUploadSelectedImages') }}
      </button>
    }

    <div class="edit-actions">
      <button
        class="app-button app-button--primary listing-form__submit"
        type="submit"
        [disabled]="isSubmitting()"
      >
        {{ isSubmitting() ? text('editListingSaving') : text('editListingSaveChanges') }}
      </button>

      <!-- <button
        class="app-button app-button--secondary edit-actions__delete"
        type="button"
        (click)="deleteListing()"
      >
        <img src="assets/icons/buy-sell/delete.svg" alt="" />
        {{ text('editListingDeleteListing') }}
      </button> -->

      <button
        class="app-button app-button--danger edit-actions__delete"
        type="button"
        (click)="deleteListing()"
      >
        <img src="assets/icons/buy-sell/delete.svg" alt="" aria-hidden="true" />
        <span>{{ text('editListingDeleteListing') }}</span>
      </button>
    </div>
  </form>
</section>
