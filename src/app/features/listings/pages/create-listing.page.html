<section class="create-listing-page">
  <div class="page-head">
    <div>
      <span class="page-head__eyebrow">{{ text('listingSellEyebrow') }}</span>
      <h1>{{ text('createListingTitle') }}</h1>
    </div>

    <p>{{ text('createListingDescription') }}</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="listing-form">
    <div class="listing-form__grid">
      <app-form-select
        [label]="text('listingCategory')"
        [required]="true"
        [options]="categoryOptions()"
        formControlName="category"
      />

      <label class="form-field">
        <span>{{ text('listingTitle') }}*</span>
        <input formControlName="title" />
      </label>

      <label class="form-field">
        <span>{{ text('listingSlug') }}*</span>
        <input formControlName="slug" />
      </label>

      <label class="form-field">
        <span>{{ text('listingPrice') }}*</span>
        <input formControlName="price" />
      </label>

      <app-form-select
        [label]="text('listingCondition')"
        [required]="true"
        [options]="conditionOptions()"
        formControlName="condition"
      />

      <app-form-select
        [label]="text('listingStatus')"
        [required]="true"
        [options]="statusOptions()"
        formControlName="status"
      />

      <label class="form-field">
        <span>{{ text('listingCity') }}*</span>
        <input formControlName="city" />
      </label>

      <label class="form-field">
        <span>{{ text('listingCountry') }}*</span>
        <input formControlName="country" />
      </label>
    </div>

    <label class="form-field form-field--textarea">
      <span>{{ text('listingDescription') }}*</span>
      <textarea rows="5" formControlName="description"></textarea>
    </label>

    <label class="upload-field">
      <input type="file" multiple accept="image/*" (change)="onFilesSelected($event)" />

      <span class="upload-field__icon" aria-hidden="true">
        <img src="assets/icons/buy-sell/upload-image.svg" alt="" />
      </span>

      <span class="upload-field__content">
        <strong>{{ text('listingImages') }}</strong>
        <small>{{ text('listingImagesHint') }}</small>
      </span>
    </label>

    @if (selectedFiles().length) {
      <p class="file-info">{{ selectedFiles().length }} {{ text('listingImagesSelected') }}</p>
    }

    @if (errorText()) {
      <p class="error-text">{{ errorText() }}</p>
    }

    <div class="listing-form__actions">
      <button
        class="app-button app-button--primary listing-form__submit"
        type="submit"
        [disabled]="isSubmitting()"
      >
        {{ isSubmitting() ? text('createListingSubmitting') : text('createListingSubmit') }}
      </button>
    </div>
  </form>
</section>
