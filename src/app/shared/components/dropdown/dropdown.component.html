<div
  class="dropdown"
  data-app-dropdown
  [class.dropdown--right]="align() === 'right'"
  [class.dropdown--item-left]="itemAlign() === 'left'"
  [style.--dropdown-min-width]="minWidth()"
  [style.--dropdown-max-menu-height]="maxMenuHeight()"
>
  <button
    type="button"
    class="app-button app-button--checkout app-dropdown__trigger dropdown__trigger"
    [disabled]="disabled()"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-label]="ariaLabel()"
    (click)="toggleMenu()"
  >
    @if (iconSrc()) {
      <span
        class="dropdown__icon"
        [style.--dropdown-icon-url]="'url(' + iconSrc() + ')'"
        aria-hidden="true"
      ></span>
    }
    <span>{{ selectedTriggerLabel() }}</span>

    <span class="dropdown__chevron">
      <img
        class="dropdown__chevron-icon dropdown__chevron-icon--default"
        [class.dropdown__chevron-icon--open]="isOpen()"
        src="assets/icons/header/chevron-down.svg"
        alt=""
        aria-hidden="true"
      />
      <img
        class="dropdown__chevron-icon dropdown__chevron-icon--hover"
        [class.dropdown__chevron-icon--open]="isOpen()"
        src="assets/icons/header/chevron-down-light.svg"
        alt=""
        aria-hidden="true"
      />
    </span>
  </button>

  @if (isOpen()) {
    <div class="app-dropdown__menu dropdown__menu">
      @for (option of options(); track option.value) {
        <button
          type="button"
          class="app-dropdown__item dropdown__item"
          [class.dropdown__item--active]="value() === option.value"
          (click)="selectOption(option.value)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  }
</div>
