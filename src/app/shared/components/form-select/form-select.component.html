<div class="form-select" [class.form-select--open]="isOpen()">
  <button
    type="button"
    class="form-select__trigger"
    [disabled]="isDisabled()"
    [attr.aria-expanded]="isOpen()"
    (click)="toggle()"
  >
    <span class="form-select__content">
      <span class="form-select__label">
        {{ label() }}
        @if (required()) {
          <span>*</span>
        }
      </span>

      <strong>{{ selectedLabel() }}</strong>
    </span>

    <span class="form-select__chevron">
      <img
        class="form-select__chevron-icon"
        src="assets/icons/buy-sell/chevron-down.svg"
        alt=""
        aria-hidden="true"
      />
    </span>
  </button>

  @if (isOpen()) {
    <div class="form-select__menu">
      @for (option of options(); track option.value) {
        <button
          type="button"
          class="form-select__option"
          [class.form-select__option--active]="selectedValue() === option.value"
          (click)="selectOption(option)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  }
</div>
