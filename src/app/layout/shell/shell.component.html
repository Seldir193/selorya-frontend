<div class="shell">
  <header class="topbar">
    <a routerLink="/" class="brand">
      <img src="assets/icons/brand-mark.svg" alt="Selorya" />
      <span>Selorya</span>
    </a>

    <nav class="topbar__nav">
      <a routerLink="/listings">Listings</a>

      <a routerLink="/profile/edit">Edit Profile</a>

      @if (authService.isAuthenticated()) {
        <a routerLink="/favorites">Favorites</a>
        <a routerLink="/orders">Orders</a>
        <a routerLink="/documents">Documents</a>
        <a routerLink="/profile">Profile</a>
        <a routerLink="/my-listings">My Listings</a>
        <a routerLink="/sell/create">Sell</a>
      }
    </nav>

    <div class="topbar__actions">
      @if (!authService.isAuthenticated()) {
        <a mat-stroked-button routerLink="/login">Login</a>
        <a mat-flat-button routerLink="/register">Register</a>
      } @else {
        <span class="user-pill">{{ authService.user()?.full_name }}</span>
        <button mat-stroked-button type="button" (click)="logout()">Logout</button>
      }
    </div>
  </header>

  <main class="shell__content">
    <router-outlet />
  </main>
</div>
