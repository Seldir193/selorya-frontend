name: Frontend CI

on:
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'angular.json'
      - 'tsconfig*.json'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'angular.json'
      - 'tsconfig*.json'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.6.2
      - run: npm ci
      - name: Run frontend tests
        shell: bash
        run: set -o pipefail; npm test -- --watch=false 2>&1 | tee frontend-test.log
      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: frontend-test.log
          retention-days: 7
      - run: npm run build
